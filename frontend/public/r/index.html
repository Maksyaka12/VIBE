<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Opening Happy Hour...</title>
  
  <!-- Social Preview Metadata -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Happy Hour - USDC Raffle" />
  <meta property="og:description" content="Win USDC rewards every hour on Base! Open in Base App to start playing." />
  <meta property="og:image" content="https://happy-hour-based.app/og-image.jpg?v=3" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Happy Hour - USDC Raffle" />
  <meta name="twitter:description" content="Win USDC rewards every hour on Base! Open in Base App to start playing." />
  <meta name="twitter:image" content="https://happy-hour-based.app/og-image.jpg?v=3" />

  <!-- Base / Farcaster / Frame Compatibility -->
  <meta name="fc:frame" content="vNext" />
  <meta name="fc:frame:image" content="https://happy-hour-based.app/og-image.jpg?v=3" />
  <meta name="fc:frame:button:1" content="Join Raffle" />
  <meta name="fc:frame:post_url" content="https://happy-hour-based.app/r" />

  <style>
    body {
      background: #F8F9FC;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      color: #32353D;
      text-align: center;
    }
    .loader {
      border: 3px solid #E5E7EB;
      border-top: 3px solid #0052FF;
      border-radius: 50%;
      width: 30px;
      height: 30px;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="loader"></div>
  <p id="status">Redirecting to Base App...</p>
  <p style="font-size: 14px; color: #717886;">
    If you are not redirected, <a id="fallback-link" href="#" style="color: #0052FF; text-decoration: none; font-weight: 600;">click here</a>.
  </p>

  <script>
    (function() {
      const appDomain = "happy-hour-based.app";
      const query = window.location.search;
      const appUrl = "https://" + appDomain + "/" + query;
      
      // Standard Base Bridge (best for Desktop)
      const bridgeUrl = "https://base.app/app/" + appDomain + query;
      
      // Direct Deep Link (best for Mobile to skip store page)
      const deepLink = "cbwallet://dapp?url=" + encodeURIComponent(appUrl);

      const statusEl = document.getElementById('status');
      const fallbackLink = document.getElementById('fallback-link');
      fallbackLink.href = bridgeUrl;

      // Detect mobile device
      const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

      if (isMobile) {
        // Try direct open
        window.location.href = deepLink;
        
        // After 2 seconds, if we are still here, it means the app didn't open
        // Fall back to the standard bridge (which shows the "Open in App Store" button)
        setTimeout(() => {
          window.location.href = bridgeUrl;
        }, 2000);
      } else {
        // Desktop: Go straight to the bridge (shows QR code)
        window.location.href = bridgeUrl;
      }
    })();
  </script>
</body>
</html>
